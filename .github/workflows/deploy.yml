name: prod-deploy

on:
  push:
    branches:
      - main # Workflow запускається автоматично при пуші в гілку main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Gulp build
        run: npx gulp build 

      - name: Deploy to VPS via rsync
        uses: Burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: ./dist/
          remote_path: /root/my_files/dashboard/dasher-1.0.0
          remote_host: 81.17.100.94
          remote_user: root
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          # КРИТИЧНО: Додаємо пароль ключа для rsync
          remote_key_pass: ${{ secrets.SSH_PASSPHRASE }}

      - name: Deploy Backend to VPS via rsync
        uses: Burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: ./backend/ # Припустимо, ваш бекенд знаходиться в папці 'backend'
          remote_path: /root/my_files/dashboard/api # Шлях на VPS для бекенду
          remote_host: 81.17.100.94
          remote_user: root
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_key_pass: ${{ secrets.SSH_PASSPHRASE }}

      - name: Post-deploy confirmation
        uses: appleboy/ssh-action@master
        with:
          host: 81.17.100.94
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # КРИТИЧНО: Додаємо пароль ключа для SSH команд
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            echo "🚀 Деплой фронтенду завершено успішно!"
            echo "🚀 Встановлення залежностей бекенду..."
            cd /root/my_files/dashboard/api
            composer install --no-dev --optimize-autoloader
            # Створіть .env файл на сервері, якщо його немає, або скопіюйте його вручну
            # echo "SUPABASE_URL=\"...\"" > .env
            # echo "SUPABASE_KEY=\"...\"" >> .env
            # echo "TELEGRAM_BOT_TOKEN=\"...\"" >> .env
            echo "✅ Залежності бекенду встановлено!"
            # Тут можна додати команду для перезапуску nginx:
            # systemctl reload nginx