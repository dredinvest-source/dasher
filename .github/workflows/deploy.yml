name: prod-deploy

on:
  push:
    branches:
      - main # Workflow запускається автоматично при пуші в гілку main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Клонуємо репозиторій на ранер GitHub

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' # Кешування пришвидшує наступні запуски

      - name: Install dependencies
        run: npm install # Встановлюємо всі пакети з package.json

      - name: Run Gulp build
        run: |
          # Використовуємо npx, щоб запустити локально встановлений gulp без глобального CLI
          npx gulp build 

      - name: Deploy to VPS via rsync
        uses: Burnett01/rsync-deployments@7.0.1 # Надійний екшн для передачі файлів
        with:
          switches: -avzr --delete # Синхронізація зі стисненням та видаленням застарілих файлів
          path: ./dist/ # Локальна папка на GitHub ранері після білду
          remote_path: /root/my_files/dashboard/dasher-1.0.1 # Шлях на твоєму VPS
          remote_host: 81.17.100.94
          remote_user: root
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Post-deploy confirmation
        uses: appleboy/ssh-action@master
        with:
          host: 81.17.100.94
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Деплой у /root/my_files/dashboard/dasher-1.0.1 завершено успішно!"
            # Тут можна додати команду для перезапуску nginx, якщо потрібно:
            # systemctl reload nginx