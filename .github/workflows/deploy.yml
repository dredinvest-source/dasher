name: prod-deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Gulp build
        run: npx gulp build 

      - name: Deploy to VPS via rsync
        uses: Burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: ./dist/
          remote_path: /root/my_files/dashboard/dasher-1.0.0
          remote_host: 81.17.100.94
          remote_user: root
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_key_pass: ${{ secrets.SSH_PASSPHRASE }}

      - name: Post-deploy confirmation
        uses: appleboy/ssh-action@master
        with:
          host: 81.17.100.94
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            echo "🚀 Деплой у /root/my_files/dashboard/dasher-1.0.1 завершено успішно!"
            # Тут можна додати команду для перезапуску nginx:
            # systemctl reload nginx